# Render 部署配置
services:
  - type: web
    name: customer-service-agent
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./customer_service.db
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: OPENAI_TEMPERATURE
        value: 0.1
      - key: OPENAI_MAX_TOKENS
        value: 4096
      - key: ENABLE_GUARDRAILS
        value: true
      - key: LOG_LEVEL
        value: INFO

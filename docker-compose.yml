version: '3.8'

services:
  # PostgreSQL - 主数据库
  postgres:
    image: postgres:16-alpine
    container_name: csa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: customer_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - 会话状态缓存
  redis:
    image: redis:7-alpine
    container_name: csa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ChromaDB - 向量数据库 (Policy RAG)
  chroma:
    image: chromadb/chroma:latest
    container_name: csa-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False

  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csa-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./simulation:/app/simulation
    command: uvicorn src.main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  postgres_data:
  redis_data:
  chroma_data:
